services:
  postgres_urban_data:
    image: postgres:15-alpine
    container_name: postgres_urban_data
    restart: unless-stopped
    environment:
      POSTGRES_DB: urban_data
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_urban_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  adminer:
    image: adminer:5.4.0-standalone
    ports:
      - 8080:8080

volumes:
  postgres_urban_data:
